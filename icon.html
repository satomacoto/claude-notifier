<!DOCTYPE html>
<html>
<head><title>claude-notifier icon</title></head>
<body style="margin:0;padding:40px;background:#f0f0f0;display:flex;gap:20px;flex-wrap:wrap;">

<!-- 1024x1024 icon preview -->
<div>
<svg id="icon" width="512" height="512" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DA7756;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4613E;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Bell icon -->
  <g transform="translate(512, 480)" fill="none" stroke="white" stroke-width="48" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bell body -->
    <path d="M0,-240 C-132,-240 -200,-160 -200,-40 C-200,80 -220,160 -280,220 L280,220 C220,160 200,80 200,-40 C200,-160 132,-240 0,-240 Z" fill="white" fill-opacity="0.95" stroke="none"/>
    <!-- Clapper -->
    <path d="M-70,220 C-70,260 -40,300 0,300 C40,300 70,260 70,220" stroke="white" stroke-width="48" fill="none"/>
  </g>

</svg>
</div>

<!-- Smaller previews -->
<div style="display:flex;flex-direction:column;gap:10px;align-items:center;">
  <p style="font-family:system-ui;color:#666;margin:0;">128px</p>
  <svg width="128" height="128" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#DA7756;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#C4613E;stop-opacity:1" />
      </linearGradient>
    </defs>
    <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg2)"/>
    <g transform="translate(512, 480)" fill="none">
      <path d="M0,-240 C-132,-240 -200,-160 -200,-40 C-200,80 -220,160 -280,220 L280,220 C220,160 200,80 200,-40 C200,-160 132,-240 0,-240 Z" fill="white" fill-opacity="0.95"/>
      <path d="M-70,220 C-70,260 -40,300 0,300 C40,300 70,260 70,220" stroke="white" stroke-width="48" fill="none" stroke-linecap="round"/>
    </g>
  </svg>

  <p style="font-family:system-ui;color:#666;margin:0;">32px</p>
  <svg width="32" height="32" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#DA7756;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#C4613E;stop-opacity:1" />
      </linearGradient>
    </defs>
    <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg3)"/>
    <g transform="translate(512, 480)" fill="none">
      <path d="M0,-240 C-132,-240 -200,-160 -200,-40 C-200,80 -220,160 -280,220 L280,220 C220,160 200,80 200,-40 C200,-160 132,-240 0,-240 Z" fill="white" fill-opacity="0.95"/>
      <path d="M-70,220 C-70,260 -40,300 0,300 C40,300 70,260 70,220" stroke="white" stroke-width="48" fill="none" stroke-linecap="round"/>
    </g>
  </svg>
</div>

</body>
</html>
